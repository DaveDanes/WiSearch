<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WiSearch | Intelligent Research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: '#F7F5F0',
              surface: '#FFFFFF',
              primary: '#9A3412', // Warm terracotta/brown
              secondary: '#78716C', // Warm gray
              accent: '#D6D3D1', // Stone 300
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'blob': 'blob 20s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(30px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(20px, -30px) scale(1.05)' },
                '66%': { transform: 'translate(-10px, 10px) scale(0.95)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-color: #F7F5F0;
        --text-color: #1C1917; /* Stone 900 */
        --mesh-bg: #F7F5F0;
        --glass-bg: rgba(255, 255, 255, 0.8);
        --glass-border: rgba(28, 25, 23, 0.05);
        --glass-card-bg: #FFFFFF;
        --glass-card-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        --scrollbar-track: #F7F5F0;
        --scrollbar-thumb: #D6D3D1;
      }
      
      html.dark {
        --bg-color: #1C1917; /* Stone 900 */
        --text-color: #F7F5F0;
        --mesh-bg: #1C1917;
        --glass-bg: rgba(41, 37, 36, 0.8); /* Stone 800 */
        --glass-border: rgba(247, 245, 240, 0.05);
        --glass-card-bg: #292524;
        --glass-card-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        --scrollbar-track: #1C1917;
        --scrollbar-thumb: #44403C;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        position: relative;
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      
      /* Grainy Texture */
      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 50;
      }

      /* Minimal elegant elements */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
      }

      .glass-card {
        background: var(--glass-card-bg);
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-card-shadow);
      }

      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: var(--mesh-bg);
        overflow: hidden;
        transition: background 0.5s ease;
      }

      .mesh-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.3;
        mix-blend-mode: normal;
      }
      
      html.dark .mesh-blob {
        opacity: 0.15;
      }

      /* Custom selection */
      ::selection {
        background: rgba(154, 52, 18, 0.2); /* Terracotta */
        color: inherit;
      }
      
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--scrollbar-track); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb); 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-color); 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased min-h-screen">
    <div class="mesh-bg">
      <!-- Muted Earthy tones -->
      <div class="mesh-blob bg-[#E7E5E4] dark:bg-[#44403C] w-[600px] h-[600px] top-[-10%] left-[-10%] animate-blob"></div>
      <div class="mesh-blob bg-[#D6D3D1] dark:bg-[#292524] w-[500px] h-[500px] bottom-[-10%] right-[-10%] animate-blob" style="animation-delay: 2s"></div>
      <div class="mesh-blob bg-[#F5F5F4] dark:bg-[#1C1917] w-[400px] h-[400px] top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-blob" style="animation-delay: 4s"></div>
    </div>
    <div id="root" class="relative z-10"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
